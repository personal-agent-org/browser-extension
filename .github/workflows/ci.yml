name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Lint (ESLint)
        run: npm run lint
      - name: Unit tests
        run: npm test
      - name: Build extension bundles
        run: npm run build
      - name: Lint Firefox bundle (web-ext)
        run: npx web-ext lint --source-dir dist/firefox
