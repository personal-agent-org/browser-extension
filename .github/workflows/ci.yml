name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call: # reused as the gate by release.yml

jobs:
  hooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pre-commit
      - run: pre-commit run --all-files

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Lint (ESLint)
        run: npm run lint
      - name: Unit tests
        run: npm test
      - name: Build extension bundles
        run: npm run build
      - name: Lint Firefox bundle (web-ext)
        run: npx web-ext lint --source-dir dist/firefox
